name: Deploy to Huawei ECS (SSH)

on:
  workflow_dispatch:
  push:
    branches: ["claude/deploy-huawei-cloud-7sNvM", "main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          ECS_PASSWORD: ${{ secrets.ECS_PASSWORD }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          if [ -z "$ECS_HOST" ]; then
            echo "::error::Missing secret ECS_HOST"
            exit 1
          fi
          if [ -z "$ECS_USERNAME" ]; then
            echo "::error::Missing secret ECS_USERNAME"
            exit 1
          fi
          if [ -z "$ECS_PASSWORD" ] && [ -z "$ECS_SSH_KEY" ]; then
            echo "::error::Must set either ECS_PASSWORD or ECS_SSH_KEY"
            exit 1
          fi

      - name: Copy index.html to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          password: ${{ secrets.ECS_PASSWORD }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          source: "index.html"
          target: "/tmp/waimaianalyze-deploy"
          overwrite: true

      - name: Install nginx and publish site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          password: ${{ secrets.ECS_PASSWORD }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -e
            # Install nginx if not present (supports yum/dnf/apt)
            if ! command -v nginx >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                dnf install -y nginx
              elif command -v yum >/dev/null 2>&1; then
                yum install -y nginx || (amazon-linux-extras install -y nginx1 || true)
              elif command -v apt-get >/dev/null 2>&1; then
                apt-get update && apt-get install -y nginx
              else
                echo "No supported package manager found" >&2
                exit 1
              fi
            fi

            # Ensure web root exists
            WEBROOT=/usr/share/nginx/html
            mkdir -p "$WEBROOT"

            # Publish the file
            cp /tmp/waimaianalyze-deploy/index.html "$WEBROOT/index.html"
            chmod 644 "$WEBROOT/index.html"

            # Enable + start/reload nginx
            systemctl enable nginx || true
            if systemctl is-active --quiet nginx; then
              nginx -t && systemctl reload nginx
            else
              systemctl start nginx
            fi

            # Cleanup
            rm -rf /tmp/waimaianalyze-deploy

            echo "Deployed. Visit: http://${{ secrets.ECS_HOST }}/"

      - name: Summary
        run: |
          echo "### Deployment complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Access URL: http://${{ secrets.ECS_HOST }}/" >> $GITHUB_STEP_SUMMARY
