name: Deploy to Huawei ECS

on:
  workflow_dispatch:
  push:
    branches: ["main", "claude/deploy-huawei-cloud-7sNvM"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          test -n "$SSH_KEY"
          test -n "$ECS_USERNAME"
          test -n "$ECS_HOST"

      - name: Deploy static assets to ECS
        env:
          SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          # 写入私钥
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # 上传文件到 Apache 目录
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            index.html share-cover.png \
            ${{ secrets.ECS_USERNAME }}@${{ secrets.ECS_HOST }}:/var/www/html/waimaianalyze/

          rm -f /tmp/deploy_key
          echo "✅ 部署完成：https://waimaiketang.com/waimaianalyze/"

      - name: Summary
        run: |
          echo "### ✅ 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "访问地址：https://waimaiketang.com/waimaianalyze/" >> $GITHUB_STEP_SUMMARY
