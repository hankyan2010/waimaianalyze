# waimaianalyze — Apache 反代片段
# 放到: /etc/httpd/conf.d/waimaianalyze.conf  (CentOS/RHEL/Alma/Rocky)
#   或: /etc/apache2/conf-enabled/waimaianalyze.conf  (Debian/Ubuntu)
#
# 作用: 把 http://<host>/waimaianalyze/api/* 反代到本机 Node 服务 127.0.0.1:3000/api/*
#      其余 /waimaianalyze/* 继续走 Apache 静态文件 (/var/www/html/waimaianalyze/)。

<IfModule mod_proxy.c>
  ProxyRequests Off
  ProxyPreserveHost On

  # /waimaianalyze/api/xxx  ->  http://127.0.0.1:3000/api/xxx
  ProxyPass        /waimaianalyze/api/  http://127.0.0.1:3000/api/
  ProxyPassReverse /waimaianalyze/api/  http://127.0.0.1:3000/api/

  # 静态文件不要被反代吃掉
  ProxyPass /waimaianalyze/index.html !
  ProxyPass /waimaianalyze/share-cover.svg !
</IfModule>

<Location /waimaianalyze/api/>
  Require all granted
  # 后端自己会设 CORS / Cache-Control，这里不再叠加
</Location>
